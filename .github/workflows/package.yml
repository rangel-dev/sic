name: Build and Release SIC

on:
  push:
    branches:
        - main
        - dev
    tags:
      - 'v*' # Mantém suporte para tags manuais se desejar


permissions:
  contents: write # Essential to allow the bot to create releases

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          # Extrai a versão do version.py
          VERSION=$(python -c "import os; print(open('src/core/version.py').read().split('VERSION = \"')[1].split('\"')[0])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip list

      - name: Build with PyInstaller
        run: |
          pyinstaller sic.spec
          ls -R dist/

      - name: Archive Production Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          iscc "/DMyAppVersion=${{ env.VERSION }}" sic.iss
          cd dist
          compress-archive -Path SIC.exe -DestinationPath SIC_Windows.zip
        shell: pwsh

      - name: Archive Production Artifact (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          chmod +x SIC.app/Contents/MacOS/SIC
          zip -r SIC_Mac.zip SIC.app


      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: SIC v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            dist/SIC_Windows.zip
            dist/SIC_Mac.zip
            dist/SIC_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

