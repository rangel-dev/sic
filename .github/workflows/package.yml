name: Build and Release SIC

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag like v0.0.9

permissions:
  contents: write # Essential to allow the bot to create releases

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller sic.spec

      - name: Archive Production Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          compress-archive -Path SIC -DestinationPath SIC_Windows.zip
        shell: pwsh

      - name: Archive Production Artifact (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r SIC_Mac.zip SIC.app

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SIC_Windows.zip
            dist/SIC_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
