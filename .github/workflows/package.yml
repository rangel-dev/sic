name: Build and Release SIC

on:
  push:
    branches:
      - main
      - dev
      - 'feature/*'
    paths-ignore:
      - '**.md'
      - 'DOCUMENTACAO.md'
      - 'JORNADA.md'
      - 'README.md'
      - 'PROJETO.md'
      - 'MANUAL.md'
      - 'FLUXO_TRABALHO.md'
      - 'history.db'
      - '.gitignore'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import os; print(open('src/core/version.py').read().split('VERSION = \"')[1].split('\"')[0])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller sic.spec

      - name: Create Installer (Inno Setup)
        run: |
          iscc "/DMyAppVersion=${{ env.VERSION }}" sic.iss
        shell: pwsh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: SIC v${{ env.VERSION }}
          draft: false
          prerelease: ${{ github.ref_name != 'main' && !startsWith(github.ref, 'refs/tags/') }}
          files: |
            dist/SIC_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
